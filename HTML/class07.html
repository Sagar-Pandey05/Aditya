<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables in HTML</title>
</head>
<body>
    <table border="1">
        <caption><i>Student Data Table</i></caption>
        
        <!-- Row 1 -->
        <thead>
            <tr>
                <th>Sections</th>
                <th>Number of Students</th>
            </tr>
        </thead>

        <tbody>
            <!-- Row 2 -->
            <tr>
                <td>A</td>
                <td>40</td>
            </tr>

            <!-- Row 3 -->
            <tr>
                <td>B</td>
                <td>25</td>
            </tr>

            <!-- Row 4 -->
            <tr>
                <td>C</td>
                <td>37</td>
            </tr>

            <!-- Row 5 -->
            <tr>
                <td>D</td>
                <td>48</td>
            </tr>
        </tbody>
        <!-- Row 6 -->
        <tfoot>
            <tr>
                <td>Total</td>
                <td>150</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
