<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms in HTML</title>
</head>
<body>
    <h1>HTML Forms</h1>
    <form action="/HTML/class03.html">
        <label for="username">Username:</label><br>
        <input type="text" required><br>

        <label for="password">Password:</label><br>
        <input type="password" required>
        <br>

        <label for="email">Email:</label><br>
        <input type="email" required>
        <br><br>

        <label for="gender" name="gen">Choose Your Gender:</label><br>
        <input type="radio" name="gen">Male
        <input type="radio" name="gen">Female
        <input type="radio" name="gen">Others

        <br>

        <label for="dob">date of birth</label>
        <input type="datetime-local">

        <label for="address">Enter Address:</label>
        <textarea name="address" rows="2" cols="30"></textarea>


        <label for="car" >Which Car You Want:</label>
        <input type="checkbox" >Thar
        <input type="checkbox" >Scorpio
        <input type="checkbox" >Fortuner
        <input type="checkbox" >Lamborgini
        <br><br>
        <input type="submit">
        <!-- <button>Submit</button> -->
    </form>
</body>
</html>
